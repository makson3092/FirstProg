<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: radial-gradient(circle closest-side, #280c75 20%, rgb(18, 13, 66) 110%);
        }

        .menu {

            margin: 120px;
            width: auto;
            display: flex;
            justify-content: center;
            position: relative;
            transition: 0.1s;


        }

        .share {

            width: 500px;
            height: 500px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgb(255 255 255 / 30%);
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
        }


        .share-top {
            position: absolute;
            top: 110px;
            background-repeat: no-repeat;

        }

        h2 {
            position: absolute;
            top: 100px;
            left: 70px;
            text-align: center;
            width: 148px;
            height: 158px;
            line-height: 22.5px;
            font-family: 'Courier New', Courier, monospace;
            color: #c6dcff;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.1s linear;
            /* display: none; */
        }

        .img {
            position: relative;
            display: block;
            width: 280px;
            opacity: 1;
            transition: opacity 0.1s linear;
        }

        .show {
            opacity: 0;
        }
    </style>
    <title>magicball</title>
</head>

<body>
    <div class="menu">
        <div class="share"><img src="img/magWind1.png" />
        </div>
        <div class="share-top"><img src="img/magWind2.png" class="img" />
            <h2>Вітаю тебе земляне!</h2>
        </div>
    </div>

    <script>
        let h2 = document.querySelector("h2");
        let div1 = document.querySelector(".menu");
        let img = document.querySelector(".img")
        let number = ["Хм...", "Не зараз", "Не можу сказати", "Ні", "Хочу персики", "Сьогодні чарівні як ніколи", "Чудова погода для прогулянки", "Поїхали!", "Піцца - чудова ідея", "Тільки білий шоколад", "Чому б і ні", "Відпочинок - гарна думка :)", "Все вийде , потрібно трохи часу"];

        console.log(img);

        document.addEventListener("click", function (e) {

            animateBounce(div1, () => {
                let randomIn = Math.floor(Math.random() * number.length);
                console.log(randomIn);
                h2.innerHTML = number[randomIn];
            });
            hideThenShowText();
        });

        function hideThenShowText() {
            h2.classList.toggle("show");
            img.classList.toggle("show");
            setTimeout(() => {
                h2.classList.toggle("show");
                img.classList.toggle("show");
            }, 350)
        }

        function animateBounce(div, callback) {

            setTimeout(function () {
                div.style.left = "-20px"
            }, 150)
            setTimeout(function () {
                div.style.left = "15px"
            }, 180)
            setTimeout(function () {
                div.style.left = "-20px"
            }, 240)
            setTimeout(function () {
                div.style.left = "20px"
            }, 280)
            setTimeout(function () {
                div.style.left = "-15px"
            }, 350)
            setTimeout(function () {
                div.style.left = "15px"
            }, 300)
            setTimeout(function () {
                div.style.left = "-20px"
            }, 280)

            setTimeout(() => {
                callback();
            }, 350)
        }

    </script>
</body>

</html>
